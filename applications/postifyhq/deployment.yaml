apiVersion: apps/v1
kind: Deployment
metadata:
  name: postifyhq-web
  namespace: postifyhq
  labels:
    app.kubernetes.io/name: postifyhq
    app.kubernetes.io/part-of: workhour-platform
    app.kubernetes.io/component: web
    app.kubernetes.io/managed-by: kubectl
    environment: development
    team: platform-engineering
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: postifyhq
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postifyhq
        app.kubernetes.io/part-of: workhour-platform
        app.kubernetes.io/component: web
        environment: development
        team: platform-engineering
    spec:
      containers:
        - name: postifyhq-web
          image: topeshittu/postifyhq:v1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          env:
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: postifyhq-config
                  key: APP_NAME
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: postifyhq-config
                  key: APP_ENV
            - name: APP_URL
              valueFrom:
                configMapKeyRef:
                  name: postifyhq-config
                  key: APP_URL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: postifyhq-config
                  key: LOG_LEVEL
            - name: TIMEZONE
              valueFrom:
                configMapKeyRef:
                  name: postifyhq-config
                  key: TIMEZONE
            - name: CACHE_DRIVER
              valueFrom:
                configMapKeyRef:
                  name: postifyhq-config
                  key: CACHE_DRIVER
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: postifyhq-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: postifyhq-config
                  key: DB_PORT
            - name: DB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: postifyhq-config
                  key: DB_DATABASE
            - name: SMTP_HOST
              valueFrom:
                configMapKeyRef:
                  name: postifyhq-config
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                configMapKeyRef:
                  name: postifyhq-config
                  key: SMTP_PORT
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postifyhq-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postifyhq-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: postifyhq-secret
                  key: JWT_SECRET
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: postifyhq-secret
                  key: API_KEY
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postifyhq-secret
                  key: MAIL_USERNAME
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postifyhq-secret
                  key: MAIL_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
