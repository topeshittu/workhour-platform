apiVersion: v1
kind: ConfigMap
metadata:
  name: postifyhq-config
  namespace: postifyhq
  labels:
    app.kubernetes.io/name: postifyhq
    app.kubernetes.io/part-of: workhour-platform
    app.kubernetes.io/component: application-config
    app.kubernetes.io/managed-by: kubectl
    environment: development
    team: platform-engineering
data:
  APP_NAME: "PostifyHQ"
  APP_ENV: "production"
  APP_URL: "http://postifyhq.local"
  LOG_LEVEL: "info"
  TIMEZONE: "UTC"
  CACHE_DRIVER: "file"
  DB_HOST: "postifyhq-mysql"
  DB_PORT: "3306"
  DB_DATABASE: "postifyhq"
  SMTP_HOST: "smtp.postifyhq.com"
  SMTP_PORT: "587"
