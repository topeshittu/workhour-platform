apiVersion: batch/v1
kind: CronJob
metadata:
  name: postifyhq-mysql-backup
  namespace: postifyhq
  labels:
    app.kubernetes.io/name: postifyhq
    app.kubernetes.io/component: mysql-backup
    app.kubernetes.io/part-of: workhour-platform
    environment: development
    team: platform-engineering
spec:
  schedule: "0 2 * * *"
  suspend: false
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: postifyhq
            app.kubernetes.io/component: mysql-backup
            app.kubernetes.io/part-of: workhour-platform
        spec:
          restartPolicy: Never
          containers:
            - name: mysql-backup
              image: mysql:8.0
              imagePullPolicy: IfNotPresent
              env:
                - name: DB_HOST
                  value: postifyhq-mysql
                - name: DB_NAME
                  valueFrom:
                    configMapKeyRef:
                      name: postifyhq-config
                      key: DB_DATABASE
                - name: MYSQL_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postifyhq-secret
                      key: MYSQL_ROOT_PASSWORD
                - name: BACKUP_DIR
                  value: /backups
              command:
                - /bin/sh
                - -c
              args:
              - |
                set -eu

                TIMESTAMP="$(date -u +%Y%m%d-%H%M%S)"
                FINAL_BACKUP_FILE="${BACKUP_DIR}/${DB_NAME}-mysql-${TIMESTAMP}.sql"
                TEMP_BACKUP_FILE="${FINAL_BACKUP_FILE}.tmp"

                cleanup() {
                  rm -f "${TEMP_BACKUP_FILE}"
                }

                trap cleanup EXIT INT TERM

                echo "Backup started."
                echo "Timestamp timezone: UTC"
                echo "Database host: ${DB_HOST}"
                echo "Database name: ${DB_NAME}"
                echo "Temporary destination: ${TEMP_BACKUP_FILE}"
                echo "Final destination: ${FINAL_BACKUP_FILE}"

                MYSQL_PWD="${MYSQL_ROOT_PASSWORD}" mysqldump \
                  --host="${DB_HOST}" \
                  --user=root \
                  --single-transaction \
                  --routines \
                  --triggers \
                  "${DB_NAME}" \
                  > "${TEMP_BACKUP_FILE}"

                if [ ! -s "${TEMP_BACKUP_FILE}" ]; then
                  echo "ERROR: Temporary backup file is missing or empty." >&2
                  exit 1
                fi

                if ! grep -q "CREATE TABLE" "${TEMP_BACKUP_FILE}"; then
                  echo "ERROR: Backup does not contain CREATE TABLE statements." >&2
                  exit 1
                fi

                mv "${TEMP_BACKUP_FILE}" "${FINAL_BACKUP_FILE}"

                trap - EXIT INT TERM

                echo "Backup completed successfully."
                ls -lh "${FINAL_BACKUP_FILE}"
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: postifyhq-mysql-backups
