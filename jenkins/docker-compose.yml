services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    image: workhour-jenkins:lts-docker
    container_name: workhour-jenkins
    user: root
    ports:
      - "8082:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  jenkins_home:
